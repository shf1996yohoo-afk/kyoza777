  <style>
:root {
  --bg: #0a1929;
  --bg-deep: #061523;
  --panel: #12293f;
  --panel-2: #16344f;
  --panel-3: #0e2438;
  --line: #23445e;
  --line-soft: #19384f;
  --text: #e7f0f7;
  --muted: #88a0b2;
  --blue: #60a5fa;
  --green: #22c55e;
  --red: #ef4444;
  --orange: #f59e0b;
  --observe: #3b82f6;
  --shadow: rgba(0,0,0,.38);
  --sans: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  --mono: "SFMono-Regular", "Cascadia Code", "Roboto Mono", Consolas, monospace;
}
:root[data-theme="light"] {
  --bg: #edf3f7; --bg-deep: #e1eaf0; --panel: #ffffff; --panel-2: #f2f7fa; --panel-3: #f7fafc;
  --line: #c7d7e2; --line-soft: #dce7ee; --text: #102536; --muted: #61798b; --blue: #2477d4;
  --green: #078956; --red: #d1384a; --orange: #b86b10; --observe: #256fc7; --shadow: rgba(21,49,70,.12);
}
* { box-sizing: border-box; }
html { scroll-behavior: smooth; scroll-padding-top: 58px; }
body { margin: 0; min-width: 320px; background: var(--bg-deep); color: var(--text); font-family: var(--sans); font-size: 12px; }
button, input, select { font: inherit; }
button { color: inherit; }
a { color: inherit; }
::selection { background: color-mix(in srgb, var(--blue) 32%, transparent); }
.hidden { display: none !important; }
.mono { font-family: var(--mono); }
.app { min-height: 100vh; background: radial-gradient(circle at 58% 0, color-mix(in srgb, var(--blue) 8%, transparent), transparent 34%), var(--bg-deep); }

.topbar { position: sticky; top: 0; z-index: 60; height: 52px; display: grid; grid-template-columns: auto auto auto 1fr minmax(230px,330px) auto; align-items: center; gap: 10px; padding: 0 14px; border-bottom: 1px solid var(--line); background: color-mix(in srgb, var(--bg-deep) 95%, transparent); box-shadow: 0 8px 25px var(--shadow); backdrop-filter: blur(14px); }
.brand { display: flex; align-items: center; gap: 8px; border: 0; background: none; padding: 0; cursor: pointer; text-align: left; }
.brand-mark { width: 27px; height: 27px; border-radius: 5px; display: grid; place-items: center; color: #071421; background: linear-gradient(145deg,#4ade80,#60a5fa); font: 800 12px var(--mono); box-shadow: 0 0 18px color-mix(in srgb,var(--blue) 35%,transparent); }
.brand strong { display: block; font-size: 12px; letter-spacing: .02em; }
.brand small { display: block; color: var(--muted); font: 7px var(--mono); letter-spacing: .08em; margin-top: 1px; }
.live-pill { height: 27px; display: flex; align-items: center; gap: 6px; padding: 0 8px; border: 1px solid color-mix(in srgb,var(--green) 36%,var(--line)); background: color-mix(in srgb,var(--green) 7%,var(--panel)); color: var(--green); font: 9px var(--mono); white-space: nowrap; }
.live-pill i { width: 5px; height: 5px; background: var(--green); border-radius: 50%; animation: pulse 1.7s infinite; }
@keyframes pulse { 0%,100% { box-shadow: 0 0 0 0 color-mix(in srgb,var(--green) 35%,transparent); } 50% { box-shadow: 0 0 0 5px transparent; } }
.snapshot-control { height: 29px; display: flex; align-items: center; gap: 5px; border: 1px solid var(--line); background: var(--panel); padding: 0 7px; white-space: nowrap; }
.snapshot-control span { color: var(--muted); font-size: 10px; }
.snapshot-control select { border: 0; outline: 0; color: var(--text); background: transparent; font: 9px var(--mono); max-width: 138px; }
.main-tabs { display: flex; align-items: stretch; height: 100%; min-width: 0; overflow-x: auto; scrollbar-width: none; }
.main-tabs::-webkit-scrollbar { display: none; }
.main-tabs button { border: 0; border-bottom: 2px solid transparent; background: transparent; padding: 0 10px; color: var(--muted); font-size: 10px; cursor: pointer; white-space: nowrap; }
.main-tabs button:hover { color: var(--text); background: color-mix(in srgb,var(--panel) 55%,transparent); }
.main-tabs button.active { color: var(--blue); border-color: var(--blue); background: color-mix(in srgb,var(--blue) 7%,transparent); box-shadow: inset 0 -10px 18px color-mix(in srgb,var(--blue) 5%,transparent); }
.search { position: relative; height: 30px; border: 1px solid var(--line); background: var(--panel); display: flex; align-items: center; gap: 6px; padding: 0 8px; }
.search > span { color: var(--muted); font-size: 14px; }
.search input { width: 100%; min-width: 0; border: 0; outline: 0; background: transparent; color: var(--text); font-size: 9px; }
.search kbd { color: var(--muted); border: 1px solid var(--line); padding: 2px 4px; font: 7px var(--mono); }
.search-results { position: absolute; top: 35px; left: -1px; right: -1px; border: 1px solid var(--line); background: var(--panel); box-shadow: 0 18px 40px var(--shadow); padding: 5px; z-index: 90; }
.search-results button { width: 100%; display: grid; grid-template-columns: 54px 1fr auto; gap: 7px; align-items: center; border: 0; background: transparent; padding: 8px; text-align: left; cursor: pointer; }
.search-results button:hover { background: var(--panel-2); }
.search-results b { color: var(--blue); font: 10px var(--mono); }
.search-results span { color: var(--muted); font-size: 9px; }
.search-results em { color: var(--green); font: 8px var(--mono); font-style: normal; }
.icon-btn { width: 30px; height: 30px; border: 1px solid var(--line); background: var(--panel); color: var(--muted); cursor: pointer; }
.icon-btn:hover { color: var(--orange); border-color: var(--orange); }

.snapshot-banner { min-height: 32px; display: flex; align-items: center; gap: 12px; padding: 5px 16px; border-bottom: 1px solid color-mix(in srgb,var(--orange) 42%,var(--line)); background: color-mix(in srgb,var(--orange) 8%,var(--panel)); color: var(--muted); font-size: 9px; }
.snapshot-banner b { color: var(--orange); font: 9px var(--mono); }
.snapshot-banner button { margin-left: auto; border: 1px solid var(--line); background: transparent; color: var(--text); padding: 4px 8px; cursor: pointer; }

.workspace { max-width: 1660px; margin: 0 auto; display: grid; grid-template-columns: 230px minmax(0,1fr); }

.badge.neutral { color: var(--blue); border-color: color-mix(in srgb,var(--blue) 38%,var(--line)); }

.kpi.good { border-left-color: var(--green); }.kpi.neutral { border-left-color: var(--blue); }.kpi.rumor { border-left-color: var(--orange); }.kpi.bad { border-left-color: var(--red); }

.donut span { position: relative; z-index: 2; text-align: center; }.donut b { display:block;font:17px var(--mono);}.donut small{color:var(--muted);font:6px var(--mono)}

(function () {
  var APP = window.APP = window.APP || {};

  function escapeHtml(value) {
    return String(value == null ? "" : value)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#039;");
  }

  function badge(value, tone) {
    return '<span class="badge ' + escapeHtml(tone || "neutral") + '">' + escapeHtml(value) + '</span>';
  }

  function credibility(value) {
    var cls = value === "权威" ? "" : value === "较可信" ? "mid" : "low";
    return '<span class="cred ' + cls + '" title="来源可信度：' + escapeHtml(value) + '">' + escapeHtml(value) + '</span>';
  }

  function render(item, restore) {
    if (!els.drawer) return;
    els.eyebrow.textContent = item.eyebrow || "DETAIL";
    els.title.textContent = item.title || "详情";
    els.body.innerHTML = item.html || "";
    els.back.style.visibility = stack.length > 1 ? "visible" : "hidden";
    els.drawer.classList.add("open");
    els.mask.classList.add("open");
    els.drawer.setAttribute("aria-hidden", "false");
    requestAnimationFrame(function () { els.body.scrollTop = restore || 0; });
  }

  APP.escape = escapeHtml;
  APP.badge = badge;
  APP.credibility = credibility;
  APP.drawer = {
    open: function (item) {
      if (stack.length) stack[stack.length - 1].scroll = els.body.scrollTop;
      stack.push({ item: item, scroll: 0 });
      render(item, 0);
    },
    back: function () {
      if (stack.length <= 1) return APP.drawer.close();
      stack.pop();
      var previous = stack[stack.length - 1];
      render(previous.item, previous.scroll);
    },
    close: function () {
      stack = [];
      if (!els.drawer) return;
      els.drawer.classList.remove("open");
      els.mask.classList.remove("open");
      els.drawer.setAttribute("aria-hidden", "true");
    },
    depth: function () { return stack.length; }
  };

  APP.note = function (key) {

  };

  };
}());

    var results=[];
    Object.keys(o(D.companies)).forEach(function(ticker){var item=D.companies[ticker];if([ticker,item.name,item.cn,item.logic].join(" ").toLowerCase().indexOf(q)>=0)results.push({type:"company",id:ticker,label:ticker,desc:item.cn+" · "+item.logic,score:"公司"});});
    a(D.signals).forEach(function(item){if([item.claim,item.sector,item.chain,a(item.companies).join(" ")].join(" ").toLowerCase().indexOf(q)>=0)results.push({type:"signal",id:item.id,label:item.date.slice(5),desc:item.claim,score:item.impact});});
    a(D.chains).forEach(function(item){if([item.name,item.highlight,a(item.companies).join(" ")].join(" ").toLowerCase().indexOf(q)>=0)results.push({type:"chain",id:item.id,label:item.score,desc:item.name+" · "+item.evidence,score:"链条"});});
    MODULES.forEach(function(group){group[1].forEach(function(item){if(item[1].toLowerCase().indexOf(q)>=0)results.push({type:"module",id:item[0],label:item[0],desc:item[1],score:"模块"});});});
    root.innerHTML=results.slice(0,8).map(function(item){return '<button data-search-type="'+item.type+'" data-search-id="'+esc(item.id)+'"><b>'+esc(item.label)+'</b><span>'+esc(item.desc)+'</span><em>'+esc(item.score)+'</em></button>';}).join("") || '<div style="padding:9px;color:var(--muted)">无匹配结果</div>';
    root.classList.remove("hidden");
  }
  function bindGlobal(){
    document.getElementById("mainTabs").addEventListener("click",function(event){var button=event.target.closest("[data-tab]");if(button)switchTab(button.dataset.tab);});
    document.getElementById("brandHome").addEventListener("click",function(){switchTab("overview");var target=document.getElementById("m03");if(target)target.scrollIntoView();});
    var theme=localStorage.getItem("aime_theme_v2")||"dark";document.documentElement.dataset.theme=theme;
    document.getElementById("themeBtn").addEventListener("click",function(){theme=theme==="dark"?"light":"dark";document.documentElement.dataset.theme=theme;localStorage.setItem("aime_theme_v2",theme);});
    var search=document.getElementById("globalSearch");search.addEventListener("input",function(){renderSearch(search.value);});
    document.addEventListener("keydown",function(event){if((event.ctrlKey||event.metaKey)&&event.key.toLowerCase()==="k"){event.preventDefault();search.focus();}});
    document.addEventListener("click",function(event){
      var t=event.target.closest("[data-note],[data-open-company],[data-open-signal],[data-open-chain],[data-open-industry],[data-open-fund],[data-open-risk],[data-open-discovery],[data-open-trade],[data-open-demand],[data-open-earning],[data-open-etf],[data-open-rumor],[data-open-macro],[data-open-priority],[data-search-type],[data-watch]");
      if(!t){if(!event.target.closest(".search"))document.getElementById("searchResults").classList.add("hidden");return;}
      if(t.dataset.watch){event.preventDefault();event.stopPropagation();APP.discovery.toggle(t.dataset.watch);return;}
      if(t.dataset.note){APP.note(t.dataset.note);return;}
      if(t.dataset.openCompany)openItem(companyDrawer(t.dataset.openCompany));
      if(t.dataset.openSignal)openItem(signalDrawer(t.dataset.openSignal));
      if(t.dataset.openChain)openItem(chainDrawer(t.dataset.openChain));
      if(t.dataset.openIndustry)openItem(industryDrawer(t.dataset.openIndustry));
      if(t.dataset.openFund!=null)openItem(fundDrawer(Number(t.dataset.openFund)));
      if(t.dataset.openRisk)openItem(riskDrawer(t.dataset.openRisk));
      if(t.dataset.openDiscovery)openItem(discoveryDrawer(t.dataset.openDiscovery));
      if(t.dataset.openTrade)openItem(tradeDrawer(t.dataset.openTrade));
      if(t.dataset.openDemand)openItem(demandDrawer(t.dataset.openDemand));
      if(t.dataset.openEarning!=null)openItem(earningDrawer(Number(t.dataset.openEarning)));
      if(t.dataset.openEtf)openItem(etfDrawer(t.dataset.openEtf));
      if(t.dataset.openRumor)openItem(rumorDrawer(t.dataset.openRumor));
      if(t.dataset.openMacro!=null)openItem(macroDrawer(Number(t.dataset.openMacro)));
      if(t.dataset.openPriority)openItem(priorityDrawer(t.dataset.openPriority));
      if(t.dataset.searchType){
        var type=t.dataset.searchType,id=t.dataset.searchId;search.value="";renderSearch("");
        if(type==="company")openItem(companyDrawer(id));if(type==="signal")openItem(signalDrawer(id));if(type==="chain")openItem(chainDrawer(id));
        if(type==="module"){switchTab("overview");var module=document.getElementById("m"+id);if(module)module.scrollIntoView();}
      }
    });
  }
  function init(){
    APP.initDrawer();APP.discovery.mount();APP.portfolio.mount();APP.alerts.mount();APP.snapshots.mount();APP.whatsnew.mount();bindGlobal();
    document.getElementById("liveCount").textContent=o(D.meta).total_signals==null?"—":o(D.meta).total_signals;
    APP.renderOverview(false);renderMacro();renderFunds();renderTrade();
  }
  if(document.readyState==="loading")document.addEventListener("DOMContentLoaded",init);else init();
}());

</script>
